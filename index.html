<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mixtape — Your Spotify Playlist</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='16' fill='%230a0a0a'/%3E%3Ctext x='50' y='82' font-family='Arial Black,sans-serif' font-weight='900' font-size='78' text-anchor='middle' fill='%231db954'%3EM%3C/text%3E%3C/svg%3E">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222222;
    --accent: #1db954;
    --accent2: #ff6b35;
    --text: #f0ede8;
    --muted: #555;
    --danger: #e53e3e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.5;
  }

  /* Ambient glow */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(29,185,84,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 0 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    padding: 52px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .logo h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 8vw, 72px);
    letter-spacing: 0.04em;
    line-height: 1;
    color: var(--text);
  }

  .logo .dot {
    width: 10px;
    height: 10px;
    background: var(--accent);
    border-radius: 50%;
    margin-bottom: 6px;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.7; }
  }

  .track-count {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding-bottom: 6px;
  }

  /* Input section */
  .input-section {
    margin-bottom: 48px;
  }

  .input-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    display: block;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }

  .url-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 14px 18px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 0.01em;
  }

  .url-input::placeholder { color: var(--muted); }

  .url-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(29,185,84,0.1);
  }

  .url-input.error {
    border-color: var(--danger);
    box-shadow: 0 0 0 3px rgba(229,62,62,0.1);
    animation: shake 0.3s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .add-btn {
    background: var(--accent);
    color: #000;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 14px 24px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
  }

  .add-btn:hover { background: #1ed760; }
  .add-btn:active { transform: scale(0.97); }

  .error-msg {
    font-size: 11px;
    color: var(--danger);
    margin-top: 8px;
    letter-spacing: 0.05em;
    min-height: 16px;
    transition: opacity 0.2s;
  }

  /* Paste hint */
  .paste-hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
    letter-spacing: 0.04em;
  }

  .paste-hint kbd {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    min-height: 32px;
  }

  .toolbar-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .toolbar-actions {
    display: flex;
    gap: 8px;
  }

  .text-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 12px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .text-btn:hover {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  .text-btn.danger:hover {
    border-color: var(--danger);
    color: var(--danger);
  }

  /* Playlist */
  #playlist {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  /* Track item */
  .track-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    animation: slideIn 0.3s ease forwards;
    transform-origin: top;
  }

  @keyframes slideIn {
    from {
      opacity: 0;
      transform: translateY(-8px) scaleY(0.97);
    }
    to {
      opacity: 1;
      transform: translateY(0) scaleY(1);
    }
  }

  .track-header {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    gap: 14px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }

  .track-header:hover { background: var(--surface2); }

  .track-num {
    font-size: 11px;
    color: var(--muted);
    width: 22px;
    text-align: right;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  .track-info {
    flex: 1;
    min-width: 0;
  }

  .track-title {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }

  .track-artist {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .track-badges {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-shrink: 0;
  }

  .badge {
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 7px;
    border-radius: 2px;
    border: 1px solid;
  }

  .badge-loading {
    color: var(--muted);
    border-color: var(--border);
    animation: blink 1s ease infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .badge-ready {
    color: var(--accent);
    border-color: rgba(29,185,84,0.3);
  }

  .badge-error {
    color: var(--danger);
    border-color: rgba(229,62,62,0.3);
  }

  .toggle-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    transition: color 0.15s, transform 0.2s;
    flex-shrink: 0;
  }

  .toggle-btn:hover { color: var(--text); }
  .toggle-btn.expanded { transform: rotate(180deg); }

  .remove-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    transition: color 0.15s;
    flex-shrink: 0;
  }

  .remove-btn:hover { color: var(--danger); }

  /* Embed container */
  .embed-container {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    border-top: 0px solid var(--border);
  }

  .embed-container.open {
    max-height: 160px;
    border-top-width: 1px;
  }

  .embed-container iframe {
    display: block;
    width: 100%;
    border: none;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    border: 1px dashed var(--border);
    border-radius: 4px;
  }

  .empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  .empty-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .empty-sub {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.05em;
    line-height: 1.6;
  }

  /* Footer */
  footer {
    margin-top: 60px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-text {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .footer-text a {
    color: var(--accent);
    text-decoration: none;
  }

  .expand-all-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.15s;
  }

  .expand-all-btn:hover { color: var(--accent); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* Responsive */
  @media (max-width: 480px) {
    .input-row { flex-direction: column; }
    .add-btn { width: 100%; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">
      <h1>Mixtape</h1>
      <div class="dot"></div>
    </div>
    <div class="track-count" id="trackCount">0 tracks</div>
  </header>

  <div class="input-section">
    <span class="input-label">Add a Spotify track, album, or playlist link</span>
    <div class="input-row">
      <input
        type="text"
        class="url-input"
        id="urlInput"
        placeholder="https://open.spotify.com/track/..."
        autocomplete="off"
        spellcheck="false"
      />
      <button class="add-btn" onclick="addTrack()">+ Add</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="paste-hint">Tip: paste a link and press <kbd>Enter</kbd> · Supports tracks, albums & playlists</div>
  </div>

  <div class="toolbar" id="toolbar" style="display:none">
    <span class="toolbar-label" id="toolbarLabel"></span>
    <div class="toolbar-actions">
      <button class="text-btn" onclick="expandAll()">Expand all</button>
      <button class="text-btn" onclick="collapseAll()">Collapse all</button>
      <button class="text-btn danger" onclick="clearAll()">Clear all</button>
    </div>
  </div>

  <div id="playlist">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🎵</div>
      <div class="empty-title">Your mixtape is empty</div>
      <div class="empty-sub">Paste Spotify links above to build<br>your ad-free playlist</div>
    </div>
  </div>

  <footer>
    <span class="footer-text">Powered by Spotify Embeds · No ads · No account needed</span>
  </footer>
</div>

<script>
  const tracks = [];
  let trackIdCounter = 0;

  const urlInput = document.getElementById('urlInput');
  const errorMsg = document.getElementById('errorMsg');
  const playlist = document.getElementById('playlist');
  const emptyState = document.getElementById('emptyState');
  const trackCountEl = document.getElementById('trackCount');
  const toolbar = document.getElementById('toolbar');
  const toolbarLabel = document.getElementById('toolbarLabel');

  // Enter key support
  urlInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addTrack();
  });

  // Paste support - auto-add on paste
  urlInput.addEventListener('paste', (e) => {
    setTimeout(() => {
      const val = urlInput.value.trim();
      if (isValidSpotifyUrl(val)) {
        setTimeout(addTrack, 100);
      }
    }, 0);
  });

  function isValidSpotifyUrl(url) {
    return /^https?:\/\/(open\.)?spotify\.com\/(track|album|playlist|episode|show|artist)\/[a-zA-Z0-9]+/.test(url);
  }

  function extractSpotifyEmbed(url) {
    // Convert open.spotify.com URL to embed URL
    // https://open.spotify.com/track/ID -> https://open.spotify.com/embed/track/ID
    const match = url.match(/spotify\.com\/(track|album|playlist|episode|show|artist)\/([a-zA-Z0-9]+)/);
    if (!match) return null;
    return {
      type: match[1],
      id: match[2],
      embedUrl: `https://open.spotify.com/embed/${match[1]}/${match[2]}?utm_source=generator&theme=0`
    };
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    urlInput.classList.add('error');
    setTimeout(() => {
      urlInput.classList.remove('error');
      errorMsg.textContent = '';
    }, 3000);
  }

  async function addTrack() {
    const rawUrl = urlInput.value.trim();
    if (!rawUrl) {
      showError('Paste a Spotify link first.');
      return;
    }

    if (!isValidSpotifyUrl(rawUrl)) {
      showError('That doesn\'t look like a Spotify link. Try open.spotify.com/track/...');
      return;
    }

    const embed = extractSpotifyEmbed(rawUrl);
    if (!embed) {
      showError('Could not parse that Spotify URL.');
      return;
    }

    // Prevent duplicates
    const exists = tracks.find(t => t.embedUrl === embed.embedUrl);
    if (exists) {
      showError('This track is already in your playlist.');
      return;
    }

    const id = ++trackIdCounter;
    const track = {
      id,
      rawUrl,
      embedUrl: embed.embedUrl,
      type: embed.type,
      spotifyId: embed.id,
      title: 'Loading...',
      artist: '',
      loaded: false
    };

    tracks.push(track);
    urlInput.value = '';
    errorMsg.textContent = '';

    renderTrack(track);
    updateUI();

    // Fetch metadata via oEmbed
    fetchMetadata(track);
  }

  async function fetchMetadata(track) {
    try {
      const oEmbedUrl = `https://open.spotify.com/oembed?url=${encodeURIComponent(track.rawUrl)}`;
      const res = await fetch(oEmbedUrl);
      if (!res.ok) throw new Error('oEmbed failed');
      const data = await res.json();

      track.title = data.title || track.type.charAt(0).toUpperCase() + track.type.slice(1);
      // Artist is in title format usually: "Song - Artist" or just title
      const parts = data.title ? data.title.split(' - ') : [];
      if (parts.length >= 2) {
        track.title = parts[0].trim();
        track.artist = parts.slice(1).join(' - ').trim();
      } else {
        track.title = data.title || 'Unknown';
        track.artist = data.provider_name || 'Spotify';
      }
      track.loaded = true;
    } catch (e) {
      // Fallback - use type + id
      track.title = `${track.type.charAt(0).toUpperCase() + track.type.slice(1)} · ${track.spotifyId.slice(0, 8)}`;
      track.artist = 'Spotify';
      track.loaded = true;
    }

    updateTrackDisplay(track);
  }

  function renderTrack(track) {
    // Remove empty state
    emptyState.style.display = 'none';

    const index = tracks.indexOf(track);
    const div = document.createElement('div');
    div.className = 'track-item';
    div.id = `track-${track.id}`;

    const heightMap = { track: 152, album: 152, playlist: 152, episode: 152, show: 152, artist: 152 };
    const iframeHeight = heightMap[track.type] || 152;

    div.innerHTML = `
      <div class="track-header" onclick="toggleEmbed(${track.id})">
        <span class="track-num">${index + 1}</span>
        <div class="track-info">
          <div class="track-title" id="title-${track.id}">Loading...</div>
          <div class="track-artist" id="artist-${track.id}"></div>
        </div>
        <div class="track-badges">
          <span class="badge badge-loading" id="badge-${track.id}">Loading</span>
          <span class="badge" style="color:var(--muted);border-color:var(--border);font-size:9px;text-transform:uppercase;letter-spacing:.08em">${track.type}</span>
        </div>
        <button class="toggle-btn" id="toggle-${track.id}" title="Expand player" onclick="event.stopPropagation();toggleEmbed(${track.id})">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 5l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="remove-btn" title="Remove" onclick="event.stopPropagation();removeTrack(${track.id})">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="embed-container" id="embed-${track.id}">
        <iframe
          src="${track.embedUrl}"
          height="${iframeHeight}"
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
          loading="lazy"
          allowfullscreen
        ></iframe>
      </div>
    `;

    playlist.appendChild(div);
  }

  function updateTrackDisplay(track) {
    const titleEl = document.getElementById(`title-${track.id}`);
    const artistEl = document.getElementById(`artist-${track.id}`);
    const badgeEl = document.getElementById(`badge-${track.id}`);

    if (titleEl) titleEl.textContent = track.title;
    if (artistEl) artistEl.textContent = track.artist;
    if (badgeEl) {
      if (track.loaded) {
        badgeEl.textContent = 'Ready';
        badgeEl.className = 'badge badge-ready';
      } else {
        badgeEl.textContent = 'Error';
        badgeEl.className = 'badge badge-error';
      }
    }
  }

  function toggleEmbed(id) {
    const embedEl = document.getElementById(`embed-${id}`);
    const toggleEl = document.getElementById(`toggle-${id}`);
    if (!embedEl) return;

    const isOpen = embedEl.classList.contains('open');
    embedEl.classList.toggle('open', !isOpen);
    toggleEl.classList.toggle('expanded', !isOpen);
  }

  function removeTrack(id) {
    const idx = tracks.findIndex(t => t.id === id);
    if (idx === -1) return;
    tracks.splice(idx, 1);

    const el = document.getElementById(`track-${id}`);
    if (el) {
      el.style.transition = 'opacity 0.2s, transform 0.2s';
      el.style.opacity = '0';
      el.style.transform = 'translateX(10px)';
      setTimeout(() => el.remove(), 200);
    }

    // Re-number tracks after removal
    setTimeout(renumberTracks, 210);
    updateUI();
  }

  function renumberTracks() {
    tracks.forEach((track, i) => {
      const numEl = document.querySelector(`#track-${track.id} .track-num`);
      if (numEl) numEl.textContent = i + 1;
    });
  }

  function expandAll() {
    tracks.forEach(track => {
      const embedEl = document.getElementById(`embed-${track.id}`);
      const toggleEl = document.getElementById(`toggle-${track.id}`);
      if (embedEl) embedEl.classList.add('open');
      if (toggleEl) toggleEl.classList.add('expanded');
    });
  }

  function collapseAll() {
    tracks.forEach(track => {
      const embedEl = document.getElementById(`embed-${track.id}`);
      const toggleEl = document.getElementById(`toggle-${track.id}`);
      if (embedEl) embedEl.classList.remove('open');
      if (toggleEl) toggleEl.classList.remove('expanded');
    });
  }

  function clearAll() {
    if (tracks.length === 0) return;
    if (!confirm(`Remove all ${tracks.length} track${tracks.length !== 1 ? 's' : ''}?`)) return;

    tracks.length = 0;
    const items = playlist.querySelectorAll('.track-item');
    items.forEach(el => el.remove());
    updateUI();
  }

  function updateUI() {
    const count = tracks.length;
    trackCountEl.textContent = `${count} track${count !== 1 ? 's' : ''}`;

    if (count === 0) {
      emptyState.style.display = '';
      toolbar.style.display = 'none';
    } else {
      emptyState.style.display = 'none';
      toolbar.style.display = 'flex';
      toolbarLabel.textContent = `${count} item${count !== 1 ? 's' : ''} in playlist`;
    }
  }
</script>
</body>
</html>
